<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — ScreenTime</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #f4f5fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .setup-card { width: 100%; max-width: 420px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); }
    .setup-icon { color: #6c63ff; font-size: 2.5rem; }
  </style>
</head>
<body>
<div class="card setup-card p-4">
  <div class="text-center mb-4">
    <i class="bi bi-display-fill setup-icon"></i>
    <h4 class="mt-2 fw-bold">ScreenTime Setup</h4>
    <p class="text-muted small">Create your admin account to get started.</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=True) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else 'success' }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post" autocomplete="off">
    <div class="mb-3">
      <label class="form-label fw-semibold small">Username</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Password <span class="text-muted">(min 8 chars)</span></label>
      <input type="password" name="password" class="form-control" required minlength="8">
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small">Confirm Password</label>
      <input type="password" name="confirm" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 fw-semibold" style="background:#6c63ff;border-color:#6c63ff">
      <i class="bi bi-check-circle me-1"></i> Create Admin Account
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
