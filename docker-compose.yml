services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DB_PATH: /data/screentime.db
      SCREENSHOT_DIR: /data/screenshots
      SCREENSHOT_RETENTION_DAYS: ${SCREENSHOT_RETENTION_DAYS:-30}
    volumes:
      - screentime_data:/data
    restart: unless-stopped

volumes:
  screentime_data:
